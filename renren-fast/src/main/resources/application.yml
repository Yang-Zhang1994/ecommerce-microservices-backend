# Tomcat (no gateway: run on 88 with context-path /api so frontend can call http://localhost:88/api/... directly)
server:
  tomcat:
    uri-encoding: UTF-8
    max-threads: 1000
    min-spare-threads: 30
  port: 88
  connection-timeout: 5000ms
  servlet:
    context-path: /api

spring:
  application:
    name: renren-fast
  # Use ShiroConfig's securityManager; disable Shiro auto-config to avoid duplicate bean
  # Disable Quartz auto-config so startup does not block on DB connection (QuartzDataSourceScriptDatabaseInitializer);
  # ScheduleConfig still provides SchedulerFactoryBean for job module.
  autoconfigure:
    exclude:
      - org.apache.shiro.spring.config.web.autoconfigure.ShiroWebAutoConfiguration
      - org.apache.shiro.spring.boot.autoconfigure.ShiroAutoConfiguration
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        hostname: host.docker.internal
        prefer-ip-address: true
        # Health check must include context-path so Consul (e.g. in Docker) can reach the endpoint
        health-check-path: /api/actuator/health
  profiles:
    active: dev
  # jackson时间格式化
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  redis:
    open: false  # 是否开启redis缓存  true开启   false关闭
    database: 0
    host: localhost
    port: 6379
    password:    # 密码（默认为空）
    timeout: 6000ms  # 连接超时时长（毫秒）
    jedis:
      pool:
        max-active: 1000  # 连接池最大连接数（使用负值表示没有限制）
        max-wait: -1ms      # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 10      # 连接池中的最大空闲连接
        min-idle: 5       # 连接池中的最小空闲连接
  # Springfox (Swagger 2) compatibility with Spring Boot 2.6+: use Ant path matcher
  mvc:
    throw-exception-if-no-handler-found: true
    pathmatch:
      matching-strategy: ant_path_matcher
  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
#  resources:
#    add-mappings: false

renren:
  redis:
    open: false
  shiro:
    redis: false
  # APP模块，是通过jwt认证的，如果要使用APP模块，则需要修改【加密秘钥】
  jwt:
    # 加密秘钥
    secret: f4e2e52034348f86b67cde581c0f9eb5[www.renren.io]
    # token有效时长，7天，单位秒
    expire: 604800
