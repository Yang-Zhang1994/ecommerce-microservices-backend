# Auth 子域：登录/注册静态由 Nginx 直出，/api 走网关（不经 Next）
server {
    listen 80;
    server_name auth.ecommerce.com;

    location ~* ^/auth/.+\.html$ {
        root /usr/share/nginx/gulimall-mall-public;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location /auth/ {
        root /usr/share/nginx/gulimall-mall-public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    location = /login {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /register {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://ecommerce_gateway/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = / {
        return 302 /login;
    }
    location / {
        return 404;
    }
}

# Admin / member: member.ecommerce.com (renren-fast admin UI on host 8081)
server {
    listen 80;
    server_name member.ecommerce.com;

    location / {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
