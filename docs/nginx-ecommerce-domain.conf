# gulimall domain access - Nginx config (static/dynamic split)
# Main site ecommerce.com → Next.js; search.ecommerce.com → Next.js (static/dynamic split)
# Requires mounting: gulimall-mall static assets (.next/static + public/static) and gateway upstream
# 登录/注册：挂载 gulimall-mall/public → /usr/share/nginx/gulimall-mall-public
#   /auth/** 下 HTML/CSS/JS/图片由 Nginx 直出（不经 Next）；/api/** 仍反代网关
# For local testing add to hosts: 127.0.0.1 ecommerce.com www.ecommerce.com search.ecommerce.com item.ecommerce.com auth.ecommerce.com member.ecommerce.com cart.ecommerce.com order.ecommerce.com
#
# 路由约定（ecommerce.com 等，匹配顺序见各块内书写顺序）：
#   /static/   → public/static（详情页等静态资源）
#   /auth/、/login、/register → public/auth（登录注册 HTML/CSS/JS/图，Nginx 直出）
#   /api/      → 网关 → 微服务
#   /_next/    → Next 开发资源
#   /          → 其余 → Next

# Gateway (Docker service name gulimall-gateway:88)
upstream ecommerce_gateway {
    # Avoid stale Docker DNS -> old container IP after gateway recreate.
    server host.docker.internal:88;
}

# Next.js runs on host port 3001; containers reach it via host.docker.internal
upstream ecommerce_next {
    server host.docker.internal:3001;
}

# Main site / home: ecommerce.com, www.ecommerce.com
# Dev mode: proxy /_next/* to Next.js (dynamic compilation); prod can switch back to alias for perf
server {
    listen 80;
    server_name ecommerce.com www.ecommerce.com;

    # Dev mode: proxy /_next/ to Next.js so HMR + on-demand assets work
    location /_next/ {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Static public assets (public/static)
    location /static/ {
        alias /usr/share/nginx/ecommerce-public-static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 登录 / 注册：静态 HTML（短缓存）
    location ~* ^/auth/.+\.html$ {
        root /usr/share/nginx/gulimall-mall-public;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    # 登录 / 注册：css/js/图片/字体等（长缓存，不经 Next）
    location /auth/ {
        root /usr/share/nginx/gulimall-mall-public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    # /login and /register → Next.js (src/app/login, src/app/register)

    # Legacy cart list template path -> Next route (smooth migration)
    location = /cart/cartList.html {
        return 302 /cart/list;
    }
    location = /cartList.html {
        return 302 /cart/list;
    }

    # API /api/* → gateway → gulimall-product and other microservices
    location /api/ {
        proxy_pass http://ecommerce_gateway/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pages (HTML / SSR / SPA) → Next.js
    location / {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Search site: search.ecommerce.com (dev mode: proxy /_next/ to Next.js)
# Root / shows search page; /search shows search with params
server {
    listen 80;
    server_name search.ecommerce.com;

    # Root path → search page with default keyword to show test data
    location = / {
        proxy_pass http://ecommerce_next/search?keyword=Apple;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/ {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /static/ {
        alias /usr/share/nginx/ecommerce-public-static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    location /api/ {
        proxy_pass http://ecommerce_gateway/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://ecommerce_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

