# Local macOS dev: 127.0.0.1 upstreams (no Docker host.docker.internal).
# Requires hosts entries from scripts/local-hosts-auth-ecommerce.txt
# Start: ./scripts/start-nginx-local.sh

upstream ecommerce_gateway {
    server 127.0.0.1:88;
}

upstream ecommerce_next {
    server 127.0.0.1:3001;
}

upstream ecommerce_admin_vue {
    server 127.0.0.1:8001;
}

# Main site: ecommerce.com, www.ecommerce.com
server {
    listen 80;
    server_name ecommerce.com www.ecommerce.com;

    location /_next/ {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /Users/samuelcoe/IdeaProjects/gulimall/gulimall-mall/public/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* ^/auth/.+\.html$ {
        root /Users/samuelcoe/IdeaProjects/gulimall/gulimall-mall/public;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /auth/ {
        root /Users/samuelcoe/IdeaProjects/gulimall/gulimall-mall/public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # /login and /register are Next.js app routes (see src/app/login, src/app/register)

    location = /cart/cartList.html {
        return 302 /cart/list;
    }

    location = /cartList.html {
        return 302 /cart/list;
    }

    location /api/ {
        proxy_pass http://ecommerce_gateway/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://ecommerce_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

