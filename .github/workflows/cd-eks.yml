# Push to main → unit tests → build 12 images → ECR → Helm upgrade on EKS.
# Secrets: AWS_ROLE_TO_ASSUME (OIDC), HELM_CERTIFICATE_ARN. See docs/CD.md.
name: CD — EKS

on:
  push:
    branches: [main, master]
    paths:
      - 'gulimall-*/**'
      - 'gulimall-common/**'
      - 'renren-fast/**'
      - 'k8s/helm/**'
      - 'k8s/scripts/gh-actions-*.sh'
      - 'k8s/scripts/common.sh'
      - 'pom.xml'
      - '.github/workflows/cd-eks.yml'
  workflow_dispatch:
    inputs:
      sync_secrets:
        description: 'Re-apply gulimall-secrets from GitHub Secrets (one-time / rotation)'
        type: boolean
        default: false
      skip_build:
        description: 'Skip Docker build; redeploy existing image tag'
        type: boolean
        default: false
      image_tag:
        description: 'Image tag when skip_build=true (default: current commit SHA)'
        required: false
        type: string

concurrency:
  group: cd-eks-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: gulimall-prod-eks

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Unit tests
        run: |
          mvn -pl gulimall-common,gulimall-order -am test \
            -Dtest=ProtectedCacheTest,IdempotencyServiceTest,OrderWorkflowServiceImplTest,StripePaymentServiceImplTest \
            -Dsurefire.failIfNoSpecifiedTests=false

  build-push:
    needs: unit-tests
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_build != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and push 12 images to ECR
        env:
          TAG: ${{ github.sha }}
        run: |
          chmod +x k8s/scripts/*.sh
          ./k8s/scripts/gh-actions-build-push.sh

  sync-secrets:
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.sync_secrets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Apply Kubernetes secrets
        env:
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
          ORDER_STRIPE_SECRET_KEY: ${{ secrets.ORDER_STRIPE_SECRET_KEY }}
          ORDER_STRIPE_WEBHOOK_SECRET: ${{ secrets.ORDER_STRIPE_WEBHOOK_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"
          chmod +x k8s/scripts/gh-actions-sync-secrets.sh
          ./k8s/scripts/gh-actions-sync-secrets.sh

  deploy:
    needs: [unit-tests, build-push, sync-secrets]
    if: |
      always() &&
      needs.unit-tests.result == 'success' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      (needs.sync-secrets.result == 'success' || needs.sync-secrets.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-helm@v4

      - name: Helm deploy (atomic rollback on failure)
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
          HELM_CERTIFICATE_ARN: ${{ secrets.HELM_CERTIFICATE_ARN }}
          HELM_ATOMIC: "true"
        run: |
          chmod +x k8s/scripts/gh-actions-helm-deploy.sh
          ./k8s/scripts/gh-actions-helm-deploy.sh
