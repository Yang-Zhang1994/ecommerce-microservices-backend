server:
  port: 13000
  forward-headers-strategy: framework

spring:
  application:
    name: gulimall-cart
  profiles:
    active: dev
  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: gulimall:auth:sessions
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        hostname: host.docker.internal
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# Same keys as gulimall-auth-server so SESSION cookie matches (subdomain SSO / HTTPS).
gulimall:
  auth:
    session:
      cookie-domain: ${GULIMALL_SESSION_COOKIE_DOMAIN:}
      cookie-secure: ${GULIMALL_SESSION_COOKIE_SECURE:false}

logging:
  level:
    com.atguigu.gulimall.cart: debug
