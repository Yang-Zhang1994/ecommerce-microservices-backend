# Disable AWS config import and auto-config during tests to avoid SDK requiring region/credentials.
spring:
  application:
    name: gulimall-search
  config:
    import: []
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.config.secretsmanager.SecretsManagerAutoConfiguration
      - io.awspring.cloud.autoconfigure.config.parameterstore.ParameterStoreAutoConfiguration

# Elasticsearch placeholder for tests (same as main; defaults to local ES).
elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  scheme: http
