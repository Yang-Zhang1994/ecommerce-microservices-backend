server:
  port: 12001

spring:
  application:
    name: gulimall-search
  cloud:
    consul:
      host: consul
      port: 8500
      discovery:
        enabled: true
        hostname: gulimall-search
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  elasticsearch:
    uris: http://elasticsearch:9200

# Elasticsearch connection config (local Docker uses localhost; override via environment variables in other environments)
elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  scheme: http

logging:
  level:
    com.atguigu.gulimall.search: debug

management:
  health:
    redis:
      enabled: false
    elasticsearch:
      enabled: false

