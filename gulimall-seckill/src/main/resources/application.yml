server:
  port: 14000
  forward-headers-strategy: framework

spring:
  application:
    name: gulimall-seckill
  profiles:
    active: dev
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        hostname: host.docker.internal
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3000ms
  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: gulimall:auth:sessions
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Los_Angeles

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

seckill:
  warmup-days: 3
  warmup-cron: "0 0/30 * * * ?"

gulimall:
  auth:
    session:
      cookie-domain: ${GULIMALL_SESSION_COOKIE_DOMAIN:}
      cookie-secure: ${GULIMALL_SESSION_COOKIE_SECURE:false}

logging:
  level:
    com.atguigu.gulimall.seckill: debug
