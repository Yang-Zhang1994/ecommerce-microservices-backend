server:
  port: 11000

spring:
  config:
    import:
      - optional:classpath:application-resilience.yml
      - optional:classpath:application-persistence.yml
  application:
    name: gulimall-ware
  profiles:
    active: dev
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        hostname: host.docker.internal
        prefer-ip-address: true
        health-check-path: /actuator/health
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      # Avoid stale Postgres connections causing intermittent lock API failures.
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:1200000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_MS:60000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:300000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT_MS:3000}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MIN_IDLE:5}
  sql:
    init:
      mode: never
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

# Stock messaging (see StockRabbitMqConfig): lock → delay queue (TTL) → DLX → release queue; order cancel → release queue
# Can be longer than order pay window: stock stays locked until this TTL unless cancel/pay releases earlier.
ware:
  stock:
    rabbit:
      delay-ttl-minutes: ${GULIMALL_STOCK_LOCK_DELAY_MINUTES:50}

logging:
  level:
    com.atguigu.gulimall.ware: debug # 设置当前项目的日志级别为 DEBUG，便于调试 SQL 语句
    org.springframework.cloud: info # 减少一些不必要的日志输出


